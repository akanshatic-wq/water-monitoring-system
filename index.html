<!DOCTYPE html>
<html>
<head>
  <title>AquaSense - Water Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }
    h1 { margin-top: 20px; font-size: 32px; }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      font-size: 20px;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,255,255,0.5);
    }
    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px cyan;
    }
    .alert {
      margin: 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
    }
    .safe-alert   { background: #00c853; }
    .danger-alert { background: #d50000; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.6; } }

    /* debug box */
    #debugBox {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,0,0.3);
      border-radius: 8px;
      margin: 0 20px 10px;
      padding: 10px 16px;
      font-size: 12px;
      color: #ffe082;
      text-align: left;
      font-family: monospace;
      display: none;
    }

    canvas { max-width: 300px; margin: 20px auto; }
    .btn {
      padding: 10px 20px;
      background: cyan;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px;
    }
    .btn:hover { background: white; }
  </style>
</head>
<body>

<h1>💧 AquaSense Water Monitoring</h1>

<div id="alertBox" class="alert safe-alert">Waiting for Data...</div>

<!-- Debug box — shows raw Firebase data -->
<div id="debugBox"></div>

<div class="dashboard">
  <div class="card">🌡 Temperature: <span id="temp">--</span></div>
  <div class="card">🧪 pH: <span id="ph">--</span></div>
  <div class="card">🌊 TDS: <span id="tds">--</span></div>
</div>

<canvas id="pieChart"></canvas>

<button class="btn" onclick="window.location.href='analysis.html'">📊 View Analysis</button>

<audio id="alertSound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script type="module">
import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDj5OOnk-e5hRRPCOUnjARLSd1TnoaQIO8",
  authDomain:        "water-quality-monitor-7def2.firebaseapp.com",
  databaseURL:       "https://water-quality-monitor-7def2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "water-quality-monitor-7def2",
  storageBucket:     "water-quality-monitor-7def2.firebasestorage.app",
  messagingSenderId: "565302773969",
  appId:             "1:565302773969:web:e49d47f796bfd7755dddf0",
  measurementId:     "G-SN578SE5M7"
};

const app      = initializeApp(firebaseConfig);
const database = getDatabase(app);
const dataRef  = ref(database, "liveData");

if ("Notification" in window && Notification.permission !== "granted") {
  Notification.requestPermission();
}

let lastStatus = "SAFE";
const alertBox   = document.getElementById("alertBox");
const alertSound = document.getElementById("alertSound");
const debugBox   = document.getElementById("debugBox");

// Pie chart
const ctx = document.getElementById('pieChart').getContext('2d');
const pieChart = new Chart(ctx, {
  type: 'pie',
  data: {
    labels: ['Safe Range', 'Outside Range'],
    datasets: [{ data: [1, 0], backgroundColor: ['#00e676', '#ff1744'] }]
  }
});

// Listen for live data
onValue(dataRef, (snapshot) => {
  const raw = snapshot.val();
  console.log("Firebase raw data:", raw);

  // ── Show debug box so we can see exact field names ──
  debugBox.style.display = 'block';
  debugBox.textContent   = '🔍 Raw Firebase data: ' + JSON.stringify(raw);

  if (!raw) {
    alertBox.className   = 'alert safe-alert';
    alertBox.textContent = '⚠️ No data in Firebase yet. Is ESP32 running?';
    return;
  }

  // ── Flexible field reading: handles temperature / temp, ph / pH, tds / TDS ──
  const tempVal = raw.temperature ?? raw.temp  ?? raw.Temperature ?? null;
  const phVal   = raw.ph          ?? raw.pH    ?? raw.PH          ?? null;
  const tdsVal  = raw.tds         ?? raw.TDS   ?? raw.Tds         ?? null;

  // Update cards
  document.getElementById("temp").innerText = tempVal !== null ? tempVal + " °C"  : "No data";
  document.getElementById("ph").innerText   = phVal   !== null ? phVal            : "No data";
  document.getElementById("tds").innerText  = tdsVal  !== null ? tdsVal + " ppm"  : "No data";

  // Safety check — only if we have all 3 values
  if (tempVal === null || phVal === null || tdsVal === null) {
    alertBox.className   = 'alert danger-alert';
    alertBox.textContent = '⚠️ Partial data received — check field names in Serial Monitor';
    return;
  }

  const isSafe =
    phVal   >= 6.5 && phVal   <= 8.5  &&
    tdsVal  >= 50  && tdsVal  <= 300  &&
    tempVal >= 20  && tempVal <= 35;

  if (isSafe) {
    alertBox.className   = 'alert safe-alert';
    alertBox.textContent = '✅ Water Quality: SAFE';
    pieChart.data.datasets[0].data = [1, 0];
    pieChart.update();
    lastStatus = "SAFE";
  } else {
    alertBox.className   = 'alert danger-alert';
    alertBox.textContent = '⚠️ Water Quality: UNSAFE';
    pieChart.data.datasets[0].data = [0, 1];
    pieChart.update();

    if (lastStatus === "SAFE" && Notification.permission === "granted") {
      new Notification("🚨 AquaSense Alert!", { body: "Water quality is unsafe!" });
      alertSound.play().catch(() => {});
    }
    lastStatus = "UNSAFE";
  }

}, (error) => {
  debugBox.style.display = 'block';
  debugBox.textContent   = '❌ Firebase error: ' + error.message;
  alertBox.className     = 'alert danger-alert';
  alertBox.textContent   = '❌ Firebase connection error';
});
</script>
</body>
</html>
