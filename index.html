<!DOCTYPE html>
<html>
<head>
  <title>AquaSense - Water Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }
    h1 { margin-top: 20px; font-size: 32px; }

    #notifBanner {
      display: none;
      background: rgba(255,193,7,0.2);
      border: 1px solid rgba(255,193,7,0.5);
      border-radius: 10px;
      margin: 0 20px 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #ffe082;
    }
    #notifBanner button {
      margin-left: 12px;
      padding: 6px 16px;
      background: #ffc107;
      color: #000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    .alert {
      margin: 16px 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
    }
    .safe-alert   { background: #00c853; }
    .danger-alert { background: #d50000; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.6; } }

    .reason-tags {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 20px 14px;
    }
    .tag { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .tag.bad  { background: rgba(213,0,0,0.4);  border: 1px solid #ff1744; }
    .tag.good { background: rgba(0,200,83,0.2);  border: 1px solid #00c853; }

    .alert-panel {
      background: rgba(255,255,255,0.08);
      border-radius: 15px;
      margin: 0 20px 16px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .panel-title { font-size: 13px; color: rgba(255,255,255,0.5); width: 100%; }
    .ctrl-btn {
      padding: 9px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .ctrl-btn:hover { opacity: 0.85; transform: scale(1.03); }
    .ctrl-btn.red   { background: #ff1744; color: white; }
    .ctrl-btn.green { background: #00c853; color: white; }
    .ctrl-btn.blue  { background: #0288d1; color: white; }
    .ctrl-btn.gray  { background: rgba(255,255,255,0.2); color: white; }

    .countdown-box {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.3);
      padding: 8px 16px;
      border-radius: 8px;
      display: none;
    }
    .countdown-box span { color: cyan; font-weight: 700; }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px 30px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      font-size: 20px;
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,255,255,0.5);
    }
    .card:hover { transform: scale(1.05); box-shadow: 0 0 25px cyan; }
    canvas { max-width: 300px; margin: 16px auto; }
    .btn {
      padding: 10px 20px;
      background: cyan;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px;
    }
    .btn:hover { background: white; }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #d50000;
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      display: none;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { bottom: 0; opacity: 0; }
      to   { bottom: 24px; opacity: 1; }
    }
  </style>
</head>
<body>

<h1>💧 AquaSense Water Monitoring</h1>

<div id="notifBanner">
  🔔 Get alerts on this device even when tab is closed.
  <button onclick="subscribePush()">Enable Alerts</button>
</div>

<div id="alertBox" class="alert safe-alert">Waiting for Data...</div>
<div class="reason-tags" id="reasonTags"></div>

<div class="alert-panel">
  <div class="panel-title">🔔 Alert Controls</div>
  <button class="ctrl-btn red"  id="buzzerBtn" onclick="toggleBuzzer()">🔇 Mute Buzzer</button>
  <button class="ctrl-btn blue" id="notifBtn"  onclick="toggleNotif()">🔕 Mute Notifications</button>
  <button class="ctrl-btn gray" onclick="testAlert()">🧪 Test Alert</button>
  <div class="countdown-box" id="countdownBox">
    Next alert in <span id="countdown">60</span>s
  </div>
</div>

<div class="dashboard">
  <div class="card">🌡 Temperature: <span id="temp">--</span></div>
  <div class="card">🧪 pH: <span id="ph">--</span></div>
  <div class="card">🌊 TDS: <span id="tds">--</span></div>
</div>

<canvas id="pieChart"></canvas>
<button class="btn" onclick="window.location.href='analysis.html'">📊 View Analysis</button>

<div id="toast">🚨 Water Quality UNSAFE!</div>

<!-- Service Worker registration + Push subscription -->
<script>
const VAPID_PUBLIC_KEY = 'BNmv-bTaiakWLNZEjCE_DHOhr5tW3JHPUSVqc42m2CT1u4EZUbrHwbNfLw0WerGrXvmv1FB2lzyMr_aAAcqeKcw';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw     = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function subscribePush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    alert('Push notifications not supported in this browser.');
    return;
  }
  const permission = await Notification.requestPermission();
  if (permission !== 'granted') {
    alert('Notification permission denied.');
    return;
  }
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    // Save subscription to backend
    const res = await fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub)
    });
    if (res.ok) {
      document.getElementById('notifBanner').style.display = 'none';
      showToast('✅ Alerts enabled on this device!');
    } else {
      showToast('❌ Failed to save subscription.');
    }
  } catch (e) {
    console.error('Push subscribe error:', e);
    showToast('❌ Could not enable push: ' + e.message);
  }
}

// Show banner if not yet subscribed
async function checkPushStatus() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  const reg = await navigator.serviceWorker.register('/sw.js');
  await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  if (!sub) {
    document.getElementById('notifBanner').style.display = 'block';
  }
}
checkPushStatus();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj5OOnk-e5hRRPCOUnjARLSd1TnoaQIO8",
  authDomain: "water-quality-monitor-7def2.firebaseapp.com",
  databaseURL: "https://water-quality-monitor-7def2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "water-quality-monitor-7def2",
  storageBucket: "water-quality-monitor-7def2.firebasestorage.app",
  messagingSenderId: "565302773969",
  appId: "1:565302773969:web:e49d47f796bfd7755dddf0"
};

const app      = initializeApp(firebaseConfig);
const database = getDatabase(app);
const dataRef  = ref(database, "liveData");

// ── Web Audio buzzer ─────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBuzzer() {
  if (buzzerMuted) return;
  audioCtx.resume().then(() => {
    [0, 0.35, 0.70].forEach(offset => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'square'; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime + offset);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + offset + 0.28);
      osc.start(audioCtx.currentTime + offset);
      osc.stop(audioCtx.currentTime  + offset + 0.28);
    });
  });
}

// ── Local notification ───────────────────────────────────────
function sendLocalNotif(title, body) {
  if (notifMuted) return;
  if (Notification.permission === 'granted') {
    new Notification(title, { body, tag: 'aquasense', renotify: true });
  }
}

// ── Toast ────────────────────────────────────────────────────
let toastTimer;
window.showToast = function(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#d50000';
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = 'none'; }, 4000);
};

// ── State ────────────────────────────────────────────────────
let buzzerMuted   = false;
let notifMuted    = false;
let isUnsafe      = false;
let lastStatus    = null;
let countdownSecs = 0;
let countdownTimer;

window.toggleBuzzer = function() {
  buzzerMuted = !buzzerMuted;
  const b = document.getElementById('buzzerBtn');
  b.textContent = buzzerMuted ? '🔔 Unmute Buzzer' : '🔇 Mute Buzzer';
  b.className   = buzzerMuted ? 'ctrl-btn green'   : 'ctrl-btn red';
  if (!buzzerMuted && isUnsafe) playBuzzer();
};

window.toggleNotif = function() {
  notifMuted = !notifMuted;
  const b = document.getElementById('notifBtn');
  b.textContent = notifMuted ? '🔔 Unmute Notifications' : '🔕 Mute Notifications';
  b.className   = notifMuted ? 'ctrl-btn green'          : 'ctrl-btn blue';
};

window.testAlert = function() {
  audioCtx.resume().then(() => {
    buzzerMuted = false; notifMuted = false;
    document.getElementById('buzzerBtn').textContent = '🔇 Mute Buzzer';
    document.getElementById('buzzerBtn').className   = 'ctrl-btn red';
    document.getElementById('notifBtn').textContent  = '🔕 Mute Notifications';
    document.getElementById('notifBtn').className    = 'ctrl-btn blue';
    playBuzzer();
    sendLocalNotif('🧪 AquaSense Test', 'Alert system working!');
    showToast('🧪 Test alert fired!', '#0288d1');
  });
};

// ── Countdown ────────────────────────────────────────────────
function startCountdown() {
  clearInterval(countdownTimer);
  countdownSecs = 60;
  const box = document.getElementById('countdownBox');
  box.style.display = 'block';
  document.getElementById('countdown').textContent = 60;

  countdownTimer = setInterval(() => {
    countdownSecs--;
    document.getElementById('countdown').textContent = countdownSecs;
    if (countdownSecs <= 0) {
      if (isUnsafe) {
        playBuzzer();
        sendLocalNotif('🚨 AquaSense', 'Water still UNSAFE!');
        // Also trigger server-side push to ALL subscribers
        fetch('/api/send-push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: '🚨 AquaSense Alert!', body: 'Water is still UNSAFE! Check immediately.' })
        });
        showToast('🚨 Water still UNSAFE!');
        startCountdown();
      } else {
        clearInterval(countdownTimer);
        box.style.display = 'none';
      }
    }
  }, 1000);
}

function stopCountdown() {
  clearInterval(countdownTimer);
  document.getElementById('countdownBox').style.display = 'none';
}

// ── Pie chart ────────────────────────────────────────────────
const ctx = document.getElementById('pieChart').getContext('2d');
const pieChart = new Chart(ctx, {
  type: 'pie',
  data: { labels: ['Safe Range','Outside Range'], datasets: [{ data:[1,0], backgroundColor:['#00e676','#ff1744'] }] }
});

// ── Firebase ─────────────────────────────────────────────────
const alertBox   = document.getElementById('alertBox');
const reasonTags = document.getElementById('reasonTags');

onValue(dataRef, (snapshot) => {
  const raw = snapshot.val();
  if (!raw) return;

  let data;
  if (raw.temperature !== undefined) {
    data = raw;
  } else {
    const entries = Object.values(raw);
    data = entries[entries.length - 1];
  }
  if (!data || data.temperature === undefined) return;

  document.getElementById('temp').innerText = data.temperature + ' °C';
  document.getElementById('ph').innerText   = data.ph;
  document.getElementById('tds').innerText  = data.tds + ' ppm';

  const phOk   = data.ph          >= 6.5 && data.ph          <= 8.5;
  const tdsOk  = data.tds         >= 50  && data.tds         <= 300;
  const tempOk = data.temperature >= 20  && data.temperature <= 35;
  const safe   = phOk && tdsOk && tempOk;

  reasonTags.innerHTML = '';
  [
    { label: `pH: ${data.ph}`,               ok: phOk   },
    { label: `TDS: ${data.tds} ppm`,         ok: tdsOk  },
    { label: `Temp: ${data.temperature}°C`,  ok: tempOk },
  ].forEach(({ label, ok }) => {
    const t = document.createElement('span');
    t.className = 'tag ' + (ok ? 'good' : 'bad');
    t.textContent = (ok ? '✅ ' : '⚠️ ') + label;
    reasonTags.appendChild(t);
  });

  if (safe) {
    alertBox.className   = 'alert safe-alert';
    alertBox.textContent = '✅ Water Quality: SAFE';
    pieChart.data.datasets[0].data = [1, 0];
    isUnsafe = false;
    stopCountdown();
    if (lastStatus === 'UNSAFE') {
      showToast('✅ Water back to SAFE!', '#00c853');
      sendLocalNotif('✅ AquaSense', 'Water quality is back to SAFE.');
    }
    lastStatus = 'SAFE';
  } else {
    alertBox.className   = 'alert danger-alert';
    alertBox.textContent = '⚠️ Water Quality: UNSAFE';
    pieChart.data.datasets[0].data = [0, 1];
    isUnsafe = true;

    if (lastStatus !== 'UNSAFE') {
      const reasons = [
        !phOk   ? `pH=${data.ph}`              : null,
        !tdsOk  ? `TDS=${data.tds}ppm`         : null,
        !tempOk ? `Temp=${data.temperature}°C` : null,
      ].filter(Boolean).join(', ');

      playBuzzer();
      sendLocalNotif('🚨 AquaSense Alert!', `Water UNSAFE! ${reasons}`);
      showToast(`🚨 UNSAFE: ${reasons}`);

      // Send push to ALL subscribers via Vercel function
      fetch('/api/send-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: '🚨 AquaSense Alert!',
          body: `Water quality UNSAFE! ${reasons}`
        })
      });

      startCountdown();
    }
    lastStatus = 'UNSAFE';
  }
  pieChart.update();
});

</script>
</body>
</html>
