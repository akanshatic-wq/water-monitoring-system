<!DOCTYPE html>
<html>
<head>
  <title>AquaSense - Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    h1 { padding: 20px; font-size: 28px; }
    a {
      color: cyan;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 20px;
    }
    #statusMsg {
      margin: 10px auto 20px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 0 auto 24px;
      max-width: 900px;
    }
    .stat-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
    }
    .stat-card .label { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
    .stat-card .value { font-size: 22px; font-weight: 600; color: cyan; }
    .chart-card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin: 16px auto;
      max-width: 900px;
    }
    .chart-card h2 { font-size: 18px; margin-bottom: 16px; color: cyan; }
    .chart-wrap { position: relative; width: 100%; height: 240px; }
  </style>
</head>
<body>

<h1>📊 Water Quality Analysis</h1>
<a href="index.html">⬅ Back to Dashboard</a>

<div id="statusMsg">⏳ Loading data...</div>

<div class="stats-grid">
  <div class="stat-card"><div class="label">Latest Temp</div><div class="value" id="statTemp">--</div></div>
  <div class="stat-card"><div class="label">Latest pH</div><div class="value" id="statPh">--</div></div>
  <div class="stat-card"><div class="label">Latest TDS</div><div class="value" id="statTds">--</div></div>
  <div class="stat-card"><div class="label">Total Readings</div><div class="value" id="statCount">--</div></div>
</div>

<div class="chart-card">
  <h2>🌡 Temperature (°C)</h2>
  <div class="chart-wrap"><canvas id="tempChart"></canvas></div>
</div>

<div class="chart-card">
  <h2>🧪 pH Level</h2>
  <div class="chart-wrap"><canvas id="phChart"></canvas></div>
</div>

<div class="chart-card">
  <h2>🌊 TDS (ppm)</h2>
  <div class="chart-wrap"><canvas id="tdsChart"></canvas></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj5OOnk-e5hRRPCOUnjARLSd1TnoaQIO8",
  authDomain: "water-quality-monitor-7def2.firebaseapp.com",
  databaseURL: "https://water-quality-monitor-7def2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "water-quality-monitor-7def2",
  storageBucket: "water-quality-monitor-7def2.firebasestorage.app",
  messagingSenderId: "565302773969",
  appId: "1:565302773969:web:e49d47f796bfd7755dddf0"
};

const app      = initializeApp(firebaseConfig);
const database = getDatabase(app);
const statusMsg = document.getElementById('statusMsg');

function makeChart(id, label, color) {
  return new Chart(document.getElementById(id), {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label,
        data: [],
        borderColor: color,
        backgroundColor: color + '22',
        fill: true,
        tension: 0.4,
        pointRadius: 2,
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: 'white' } } },
      scales: {
        x: { ticks: { color: 'rgba(255,255,255,0.5)', maxRotation: 45, autoSkip: true, maxTicksLimit: 12 }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: 'rgba(255,255,255,0.6)' }, grid: { color: 'rgba(255,255,255,0.1)' } }
      }
    }
  });
}

const tempChart = makeChart('tempChart', 'Temperature (°C)', '#ff6d00');
const phChart   = makeChart('phChart',   'pH',               '#00e676');
const tdsChart  = makeChart('tdsChart',  'TDS (ppm)',        '#00e5ff');

function renderCharts(entries) {
  const last30 = entries.slice(-30); // show last 30 readings

  [tempChart, phChart, tdsChart].forEach(c => {
    c.data.labels = [];
    c.data.datasets[0].data = [];
  });

  last30.forEach((entry, i) => {
    const label = '#' + (entries.length - last30.length + i + 1);
    tempChart.data.labels.push(label);
    tempChart.data.datasets[0].data.push(entry.temperature ?? null);
    phChart.data.labels.push(label);
    phChart.data.datasets[0].data.push(entry.ph ?? null);
    tdsChart.data.labels.push(label);
    tdsChart.data.datasets[0].data.push(entry.tds ?? null);
  });

  [tempChart, phChart, tdsChart].forEach(c => c.update());

  const latest = last30[last30.length - 1];
  if (latest) {
    document.getElementById('statTemp').textContent  = (latest.temperature ?? '--') + ' °C';
    document.getElementById('statPh').textContent    =  latest.ph          ?? '--';
    document.getElementById('statTds').textContent   = (latest.tds         ?? '--') + ' ppm';
    document.getElementById('statCount').textContent =  entries.length;
  }
}

// ── Try /history first ──────────────────────────────────────
const historyRef  = ref(database, 'history');
const liveDataRef = ref(database, 'liveData');

onValue(historyRef, (snapshot) => {
  const histData = snapshot.val();

  if (histData && typeof histData === 'object') {
    const entries = Object.values(histData);
    if (entries.length > 0 && entries[0].temperature !== undefined) {
      statusMsg.textContent = '✅ History data — ' + entries.length + ' readings';
      statusMsg.style.background = 'rgba(0,200,83,0.2)';
      renderCharts(entries);
      return;
    }
  }

  // ── Fallback: use liveData push keys as history ─────────────
  // Your ESP32 was POSTing to liveData, so all history is there!
  onValue(liveDataRef, (snap) => {
    const raw = snap.val();
    if (!raw) {
      statusMsg.textContent = '❌ No data found. Make sure ESP32 is running.';
      statusMsg.style.background = 'rgba(213,0,0,0.2)';
      return;
    }

    // Check if liveData has push-key history entries
    const firstVal = Object.values(raw)[0];
    if (typeof firstVal === 'object' && firstVal.temperature !== undefined) {
      // liveData contains history (push keys) — use it!
      const entries = Object.values(raw);
      statusMsg.textContent = '📦 Using liveData history — ' + entries.length + ' readings (move ESP32 to POST /history for future)';
      statusMsg.style.background = 'rgba(255,160,0,0.2)';
      renderCharts(entries);
    } else if (raw.temperature !== undefined) {
      // liveData is flat — only 1 reading available
      statusMsg.textContent = '⚠️ Only 1 live reading available. History will build up over time.';
      statusMsg.style.background = 'rgba(255,160,0,0.2)';
      renderCharts([raw]);
    }
  }, { onlyOnce: true });

}, { onlyOnce: true });
</script>
</body>
</html>
