<!DOCTYPE html>
<html>
<head>
  <title>AquaSense - Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    h1 { padding: 20px; font-size: 28px; }
    a {
      color: cyan;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-bottom: 20px;
    }
    #statusMsg {
      margin: 10px auto 20px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin: 0 auto 24px;
      max-width: 900px;
    }
    .stat-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
    }
    .stat-card .label { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
    .stat-card .value { font-size: 22px; font-weight: 600; color: cyan; }
    .chart-card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin: 16px auto;
      max-width: 900px;
    }
    .chart-card h2 { font-size: 18px; margin-bottom: 16px; color: cyan; }
    .chart-wrap { position: relative; width: 100%; height: 240px; }

    .filter-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 auto 20px;
    }
    .filter-btn {
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: cyan;
      color: #000;
      border-color: cyan;
    }
  </style>
</head>
<body>

<h1>📊 Water Quality Analysis</h1>
<a href="/">⬅ Back to Dashboard</a>

<div id="statusMsg">⏳ Loading data...</div>

<div class="stats-grid">
  <div class="stat-card"><div class="label">Latest Temp</div><div class="value" id="statTemp">--</div></div>
  <div class="stat-card"><div class="label">Latest pH</div><div class="value" id="statPh">--</div></div>
  <div class="stat-card"><div class="label">Latest TDS</div><div class="value" id="statTds">--</div></div>
  <div class="stat-card"><div class="label">Total Readings</div><div class="value" id="statCount">--</div></div>
  <div class="stat-card"><div class="label">Safe %</div><div class="value" id="statSafe">--</div></div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter(30,  this)">Last 30</button>
  <button class="filter-btn"        onclick="setFilter(100, this)">Last 100</button>
  <button class="filter-btn"        onclick="setFilter(200, this)">Last 200</button>
  <button class="filter-btn"        onclick="setFilter(0,   this)">All</button>
</div>

<div class="chart-card">
  <h2>🌡 Temperature (°C)</h2>
  <div class="chart-wrap"><canvas id="tempChart"></canvas></div>
</div>

<div class="chart-card">
  <h2>🧪 pH Level</h2>
  <div class="chart-wrap"><canvas id="phChart"></canvas></div>
</div>

<div class="chart-card">
  <h2>🌊 TDS (ppm)</h2>
  <div class="chart-wrap"><canvas id="tdsChart"></canvas></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, onValue, push
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj5OOnk-e5hRRPCOUnjARLSd1TnoaQIO8",
  authDomain: "water-quality-monitor-7def2.firebaseapp.com",
  databaseURL: "https://water-quality-monitor-7def2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "water-quality-monitor-7def2",
  storageBucket: "water-quality-monitor-7def2.firebasestorage.app",
  messagingSenderId: "565302773969",
  appId: "1:565302773969:web:e49d47f796bfd7755dddf0"
};

const app      = initializeApp(firebaseConfig);
const db       = getDatabase(app);
const histRef  = ref(db, "history");
const liveRef  = ref(db, "liveData");
const statusMsg = document.getElementById('statusMsg');

// ── Save every live reading into /history ────────────────────
let lastUptime = -1;
onValue(liveRef, (snap) => {
  const d = snap.val();
  if (!d || d.temperature === undefined) return;
  // Only push if it's a new reading (uptime changed)
  if (d.uptime === lastUptime) return;
  lastUptime = d.uptime;
  push(histRef, {
    temperature: d.temperature,
    ph:          d.ph,
    tds:         d.tds,
    danger:      d.danger || false,
    ts:          Date.now()
  });
});

// ── Charts ───────────────────────────────────────────────────
function makeChart(id, label, color, minY, maxY) {
  return new Chart(document.getElementById(id), {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label,
        data: [],
        borderColor: color,
        backgroundColor: color + '33',
        fill: true,
        tension: 0.4,
        pointRadius: 2,
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: 'white' } } },
      scales: {
        x: {
          ticks: {
            color: 'rgba(255,255,255,0.5)',
            maxRotation: 45,
            autoSkip: true,
            maxTicksLimit: 12
          },
          grid: { color: 'rgba(255,255,255,0.05)' }
        },
        y: {
          min: minY,
          max: maxY,
          ticks: { color: 'rgba(255,255,255,0.6)' },
          grid: { color: 'rgba(255,255,255,0.1)' }
        }
      }
    }
  });
}

const tempChart = makeChart('tempChart', 'Temperature (°C)', '#ff6d00', 0,   50);
const phChart   = makeChart('phChart',   'pH',               '#00e676', 0,   14);
const tdsChart  = makeChart('tdsChart',  'TDS (ppm)',        '#00e5ff', 0, 1000);

// ── Filter ───────────────────────────────────────────────────
let allEntries  = [];
let filterCount = 30;

window.setFilter = function(n, btn) {
  filterCount = n;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCharts();
};

function renderCharts() {
  const entries = filterCount === 0
    ? allEntries
    : allEntries.slice(-filterCount);

  if (entries.length === 0) {
    statusMsg.textContent = '⚠️ No history yet — keep ESP32 running, data will appear here.';
    statusMsg.style.background = 'rgba(255,160,0,0.2)';
    return;
  }

  [tempChart, phChart, tdsChart].forEach(c => {
    c.data.labels = [];
    c.data.datasets[0].data = [];
  });

  let safeCount = 0;

  entries.forEach((entry) => {
    const label = entry.ts
      ? new Date(entry.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : '#';

    tempChart.data.labels.push(label);
    tempChart.data.datasets[0].data.push(
      entry.temperature !== undefined ? +entry.temperature.toFixed(1) : null
    );

    phChart.data.labels.push(label);
    phChart.data.datasets[0].data.push(
      entry.ph !== undefined ? +entry.ph.toFixed(2) : null
    );

    tdsChart.data.labels.push(label);
    tdsChart.data.datasets[0].data.push(
      entry.tds !== undefined ? Math.round(entry.tds) : null
    );

    const safe =
      entry.ph >= 6.5 && entry.ph <= 8.5 &&
      entry.tds >= 50 && entry.tds <= 300 &&
      entry.temperature >= 20 && entry.temperature <= 35;
    if (safe) safeCount++;
  });

  [tempChart, phChart, tdsChart].forEach(c => c.update());

  const latest = entries[entries.length - 1];
  document.getElementById('statTemp').textContent  = latest.temperature?.toFixed(1) + ' °C';
  document.getElementById('statPh').textContent    = latest.ph?.toFixed(2);
  document.getElementById('statTds').textContent   = Math.round(latest.tds) + ' ppm';
  document.getElementById('statCount').textContent = allEntries.length;
  document.getElementById('statSafe').textContent  =
    ((safeCount / entries.length) * 100).toFixed(1) + '%';

  statusMsg.textContent =
    '✅ Showing ' + entries.length + ' of ' + allEntries.length + ' readings — live';
  statusMsg.style.background = 'rgba(0,200,83,0.15)';
}

// ── Listen to history (live updates) ─────────────────────────
onValue(histRef, (snap) => {
  const raw = snap.val();
  if (!raw) {
    statusMsg.textContent =
      '⏳ No history yet. ESP32 must send at least one reading first.';
    statusMsg.style.background = 'rgba(255,160,0,0.2)';
    return;
  }
  allEntries = Object.values(raw)
    .filter(e => e && e.temperature !== undefined)
    .sort((a, b) => (a.ts || 0) - (b.ts || 0));
  renderCharts();
});
</script>
</body>
</html>
