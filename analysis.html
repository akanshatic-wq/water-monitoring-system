<!DOCTYPE html>
<html>
<head>
  <title>AquaSense - Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Poppins, sans-serif;
      background: #1e2a38;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
    }

    a {
      color: cyan;
      text-decoration: none;
      font-weight: bold;
    }

    canvas {
      max-width: 900px;
      margin: 40px auto;
    }
  </style>
</head>

<body>

<h1>📊 Water Quality Analysis</h1>
<a href="index.html">⬅ Back to Dashboard</a>

<canvas id="tdsChart"></canvas>
<canvas id="tempChart"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj5OOnk-e5hRRPCOUnjARLSd1TnoaQIO8",
  authDomain: "water-quality-monitor-7def2.firebaseapp.com",
  databaseURL: "https://water-quality-monitor-7def2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "water-quality-monitor-7def2",
  storageBucket: "water-quality-monitor-7def2.firebasestorage.app",
  messagingSenderId: "565302773969",
  appId: "1:565302773969:web:e49d47f796bfd7755dddf0"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

// ✅ IMPORTANT CHANGE
const dataRef = ref(database, 'history');

const tdsChart = new Chart(document.getElementById("tdsChart"), {
  type: 'line',
  data: { labels: [], datasets: [{ label: "TDS (ppm)", data: [] }] }
});

const tempChart = new Chart(document.getElementById("tempChart"), {
  type: 'line',
  data: { labels: [], datasets: [{ label: "Temperature (°C)", data: [] }] }
});

onValue(dataRef, (snapshot) => {

  const allData = snapshot.val();
  if (!allData) return;

  const entries = Object.values(allData);

  tdsChart.data.labels = [];
  tdsChart.data.datasets[0].data = [];

  tempChart.data.labels = [];
  tempChart.data.datasets[0].data = [];

  entries.slice(-15).forEach((entry) => {
    const time = new Date().toLocaleTimeString();

    tdsChart.data.labels.push(time);
    tdsChart.data.datasets[0].data.push(entry.tds);

    tempChart.data.labels.push(time);
    tempChart.data.datasets[0].data.push(entry.temperature);
  });

  tdsChart.update();
  tempChart.update();
});

</script>
</body>
</html>
