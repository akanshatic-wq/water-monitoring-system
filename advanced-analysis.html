<!DOCTYPE html>
<html>
<head>
  <title>Advanced Water Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f2027;
      color: white;
      text-align: center;
    }

    h1 { margin: 20px; }

    .stats {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 15px 25px;
      border-radius: 12px;
      font-size: 18px;
    }

    /* BIG GRAPH */
    .chart-container {
      width: 95%;
      height: 75vh;
      margin: 30px auto;
    }

    .chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .btn {
      padding: 10px 20px;
      background: cyan;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 20px;
    }
  </style>
</head>
<body>

<h1>📊 Advanced Water Analysis</h1>

<div class="stats">
  <div class="card">Avg Temp: <span id="avgTemp">--</span></div>
  <div class="card">Avg pH: <span id="avgPh">--</span></div>
  <div class="card">Avg TDS: <span id="avgTds">--</span></div>
  <div class="card">Safe %: <span id="safePercent">--</span></div>
</div>

<div class="chart-container">
  <canvas id="trendChart"></canvas>
</div>

<button class="btn" onclick="window.location.href='index.html'">⬅ Back</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "water-quality-monitor-7def2.firebaseapp.com",
  databaseURL: "https://water-quality-monitor-7def2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "water-quality-monitor-7def2",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db, "liveData");

/* ✅ move function OUTSIDE */
function reduceData(data, step = 5) {
  return data.filter((_, i) => i % step === 0);
}

let temps = [], phs = [], tdss = [], safeCount = 0;

const ctx = document.getElementById('trendChart').getContext('2d');

/* gradients */
const gradTemp = ctx.createLinearGradient(0, 0, 0, 400);
gradTemp.addColorStop(0, "rgba(79,195,247,0.5)");
gradTemp.addColorStop(1, "rgba(79,195,247,0)");

const gradPH = ctx.createLinearGradient(0, 0, 0, 400);
gradPH.addColorStop(0, "rgba(255,92,138,0.5)");
gradPH.addColorStop(1, "rgba(255,92,138,0)");

const gradTDS = ctx.createLinearGradient(0, 0, 0, 400);
gradTDS.addColorStop(0, "rgba(255,167,38,0.5)");
gradTDS.addColorStop(1, "rgba(255,167,38,0)");

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      {
        label: 'Temperature (°C)',
        data: [],
        borderColor: '#4fc3f7',
        backgroundColor: gradTemp,
        fill: true,
        tension: 0.4,
        borderWidth: 2,
        yAxisID: 'yTemp'
      },
      {
        label: 'pH',
        data: [],
        borderColor: '#ff5c8a',
        backgroundColor: gradPH,
        fill: true,
        tension: 0.4,
        borderWidth: 2,
        yAxisID: 'yPH'
      },
      {
        label: 'TDS (ppm)',
        data: [],
        borderColor: '#ffa726',
        backgroundColor: gradTDS,
        fill: true,
        tension: 0.4,
        borderWidth: 2,
        yAxisID: 'yTDS'
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: {
      mode: 'index',
      intersect: false
    },
    plugins: {
      legend: {
        labels: { color: 'white' }
      }
    },
    elements: {
      point: { radius: 0 }
    },
    scales: {
      x: {
        ticks: { color: 'white' },
        grid: { color: 'rgba(255,255,255,0.05)' }
      },
      yTemp: {
        type: 'linear',
        position: 'left',
        ticks: { color: '#4fc3f7' },
        title: { display: true, text: 'Temp (°C)', color: '#4fc3f7' }
      },
      yTDS: {
        type: 'linear',
        position: 'right',
        ticks: { color: '#ffa726' },
        grid: { drawOnChartArea: false },
        title: { display: true, text: 'TDS (ppm)', color: '#ffa726' }
      },
      yPH: {
        type: 'linear',
        position: 'right',
        min: 0,
        max: 14,
        display: false
      }
    }
  }
});

onValue(dataRef, (snapshot) => {
  const raw = snapshot.val();
  if (!raw) return;

  const entries = Object.values(raw);
  const reducedEntries = reduceData(entries, 5);

  temps = [];
  phs = [];
  tdss = [];
  safeCount = 0;

  chart.data.labels = [];
  chart.data.datasets.forEach(ds => ds.data = []);

  reducedEntries.forEach((data, index) => {
    temps.push(data.temperature);
    phs.push(data.ph);
    tdss.push(data.tds);

    chart.data.labels.push(index + 1);
    chart.data.datasets[0].data.push(data.temperature);
    chart.data.datasets[1].data.push(data.ph);
    chart.data.datasets[2].data.push(data.tds);

    const safe =
      data.ph >= 6.5 && data.ph <= 8.5 &&
      data.tds >= 50 && data.tds <= 300 &&
      data.temperature >= 20 && data.temperature <= 35;

    if (safe) safeCount++;
  });

  const avg = arr => (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2);

  document.getElementById('avgTemp').innerText = avg(temps) + " °C";
  document.getElementById('avgPh').innerText   = avg(phs);
  document.getElementById('avgTds').innerText  = avg(tdss) + " ppm";

  const safePercent = ((safeCount / reducedEntries.length) * 100).toFixed(1);
  document.getElementById('safePercent').innerText = safePercent + "%";

  chart.update();
});
</script>

</body>
</html>
