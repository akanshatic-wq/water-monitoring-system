<!DOCTYPE html>
<html>
<head>
  <title>Advanced Water Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }
    h1 { margin: 20px; font-size: 28px; }

    .stats {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      padding: 0 20px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 17px;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
    }

    .filter-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px;
    }
    .filter-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: cyan;
      color: #000;
      border-color: cyan;
    }

    .chart-container {
      width: 95%;
      height: 70vh;
      margin: 10px auto 20px;
    }
    .chart-container canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .status-row {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }

    .btn {
      padding: 10px 20px;
      background: cyan;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      margin: 10px;
      color: #000;
      font-weight: 600;
    }
    .btn:hover { background: white; }
    .btn.red { background: #ff1744; color: white; }
    .btn.red:hover { background: #ff6090; }
  </style>
</head>
<body>

<h1>📊 Advanced Water Analysis</h1>

<div class="stats">
  <div class="card">🌡 Avg Temp: <span id="avgTemp">--</span></div>
  <div class="card">🧪 Avg pH: <span id="avgPh">--</span></div>
  <div class="card">🌊 Avg TDS: <span id="avgTds">--</span></div>
  <div class="card">✅ Safe %: <span id="safePercent">--</span></div>
  <div class="card">📦 Records: <span id="recordCount">--</span></div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter(50,  this)">Last 50</button>
  <button class="filter-btn"        onclick="setFilter(100, this)">Last 100</button>
  <button class="filter-btn"        onclick="setFilter(200, this)">Last 200</button>
  <button class="filter-btn"        onclick="setFilter(0,   this)">All</button>
</div>

<div class="status-row" id="statusRow">Loading history...</div>

<div class="chart-container">
  <canvas id="trendChart"></canvas>
</div>

<button class="btn" onclick="window.location.href='/'">⬅ Back</button>
<button class="btn red" onclick="clearHistory()">🗑 Clear History</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, onValue, push, remove, query, limitToLast
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj5OOnk-e5hRRPCOUnjARLSd1TnoaQIO8",
  authDomain: "water-quality-monitor-7def2.firebaseapp.com",
  databaseURL: "https://water-quality-monitor-7def2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "water-quality-monitor-7def2",
  storageBucket: "water-quality-monitor-7def2.firebasestorage.app",
  messagingSenderId: "565302773969",
  appId: "1:565302773969:web:e49d47f796bfd7755dddf0"
};

const app      = initializeApp(firebaseConfig);
const db       = getDatabase(app);
const liveRef  = ref(db, "liveData");
const histRef  = ref(db, "history");

// ── Save live data into history every time it updates ──────────────
onValue(liveRef, (snap) => {
  const d = snap.val();
  if (!d || d.temperature === undefined) return;

  // Push a timestamped copy into /history
  push(histRef, {
    temperature: d.temperature,
    ph:          d.ph,
    tds:         d.tds,
    danger:      d.danger || false,
    ts:          Date.now()
  });
});

// ── Chart setup ────────────────────────────────────────────────────
const ctx = document.getElementById('trendChart').getContext('2d');

const gradTemp = ctx.createLinearGradient(0, 0, 0, 400);
gradTemp.addColorStop(0, "rgba(79,195,247,0.5)");
gradTemp.addColorStop(1, "rgba(79,195,247,0)");

const gradPH = ctx.createLinearGradient(0, 0, 0, 400);
gradPH.addColorStop(0, "rgba(255,92,138,0.5)");
gradPH.addColorStop(1, "rgba(255,92,138,0)");

const gradTDS = ctx.createLinearGradient(0, 0, 0, 400);
gradTDS.addColorStop(0, "rgba(255,167,38,0.5)");
gradTDS.addColorStop(1, "rgba(255,167,38,0)");

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      {
        label: 'Temperature (°C)',
        data: [],
        borderColor: '#4fc3f7',
        backgroundColor: gradTemp,
        fill: true, tension: 0.4, borderWidth: 2,
        yAxisID: 'yTemp'
      },
      {
        label: 'pH',
        data: [],
        borderColor: '#ff5c8a',
        backgroundColor: gradPH,
        fill: true, tension: 0.4, borderWidth: 2,
        yAxisID: 'yPH'
      },
      {
        label: 'TDS (ppm)',
        data: [],
        borderColor: '#ffa726',
        backgroundColor: gradTDS,
        fill: true, tension: 0.4, borderWidth: 2,
        yAxisID: 'yTDS'
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { labels: { color: 'white' } }
    },
    elements: { point: { radius: 0 } },
    scales: {
      x: {
        ticks: { color: 'white', maxTicksLimit: 20 },
        grid:  { color: 'rgba(255,255,255,0.05)' }
      },
      yTemp: {
        type: 'linear', position: 'left',
        ticks: { color: '#4fc3f7' },
        title: { display: true, text: 'Temp (°C)', color: '#4fc3f7' }
      },
      yTDS: {
        type: 'linear', position: 'right',
        ticks: { color: '#ffa726' },
        grid: { drawOnChartArea: false },
        title: { display: true, text: 'TDS (ppm)', color: '#ffa726' }
      },
      yPH: {
        type: 'linear', position: 'right',
        min: 0, max: 14, display: false
      }
    }
  }
});

// ── Filter & render ────────────────────────────────────────────────
let allEntries  = [];
let filterCount = 50;   // default: last 50

window.setFilter = function(n, btn) {
  filterCount = n;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
};

function renderChart() {
  const entries = filterCount === 0
    ? allEntries
    : allEntries.slice(-filterCount);

  if (entries.length === 0) {
    document.getElementById('statusRow').textContent =
      'No history yet — data will appear as the ESP32 sends readings.';
    return;
  }

  let temps = [], phs = [], tdss = [], safeCount = 0;
  chart.data.labels = [];
  chart.data.datasets.forEach(ds => ds.data = []);

  entries.forEach((d, i) => {
    const label = d.ts
      ? new Date(d.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      : (i + 1).toString();

    chart.data.labels.push(label);
    chart.data.datasets[0].data.push(d.temperature);
    chart.data.datasets[1].data.push(d.ph);
    chart.data.datasets[2].data.push(d.tds);

    temps.push(d.temperature);
    phs.push(d.ph);
    tdss.push(d.tds);

    const safe =
      d.ph >= 6.5 && d.ph <= 8.5 &&
      d.tds >= 50 && d.tds <= 300 &&
      d.temperature >= 20 && d.temperature <= 35;
    if (safe) safeCount++;
  });

  const avg = arr => (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2);

  document.getElementById('avgTemp').innerText    = avg(temps) + ' °C';
  document.getElementById('avgPh').innerText      = avg(phs);
  document.getElementById('avgTds').innerText     = avg(tdss) + ' ppm';
  document.getElementById('safePercent').innerText =
    ((safeCount / entries.length) * 100).toFixed(1) + '%';
  document.getElementById('recordCount').innerText =
    entries.length + (filterCount === 0 ? '' : ' / ' + allEntries.length + ' total');
  document.getElementById('statusRow').textContent =
    'Showing ' + entries.length + ' readings. Updates live.';

  chart.update();
}

// ── Listen to history ──────────────────────────────────────────────
onValue(histRef, (snap) => {
  const raw = snap.val();
  if (!raw) {
    document.getElementById('statusRow').textContent =
      'No history yet. Waiting for ESP32 data...';
    return;
  }
  allEntries = Object.values(raw).sort((a, b) => (a.ts || 0) - (b.ts || 0));
  renderChart();
});

// ── Clear history ──────────────────────────────────────────────────
window.clearHistory = function() {
  if (!confirm('Delete all history? This cannot be undone.')) return;
  remove(histRef).then(() => {
    allEntries = [];
    chart.data.labels = [];
    chart.data.datasets.forEach(ds => ds.data = []);
    chart.update();
    document.getElementById('statusRow').textContent = 'History cleared.';
    document.getElementById('avgTemp').innerText    = '--';
    document.getElementById('avgPh').innerText      = '--';
    document.getElementById('avgTds').innerText     = '--';
    document.getElementById('safePercent').innerText = '--';
    document.getElementById('recordCount').innerText = '--';
  });
};
</script>
</body>
</html>
